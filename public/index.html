<!DOCTYPE html>
<html lang="en-GB" data-framework="javascript">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List</title>
  <link rel="stylesheet" href="lib/todomvc-app.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="shortcut icon" href="lib/favicon.ico" type="image/x-icon">
</head>
<body>

  <!-- Блок со ссылками "Войдите" и "зарегистрируйтесь" -->
  <div id="auth-links">
    <span id="guest-message">
      <a href="#" id="login-link">Войдите</a>
      или
      <a href="#" id="register-link">зарегистрируйтесь</a>, чтобы ваши задачи не потерялись
    </span>
  </div>

  <!-- Кнопка "Выйти" -->
  <button id="logout-btn" class="logout-button">
    Выйти
  </button>

    <!-- Основное приложение -->
    <div id="app"></div>

  <!-- Модальное окно для входа -->
  <div id="login-modal" class="modal hidden">
    <div class="modal-content">
      <span class="close-modal" data-modal="login">&times;</span>
      <h2>Вход</h2>
      <form id="login-form">
        <input type="email" id="login-email" placeholder="Email" required>
        <input type="password" id="login-password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
        <div id="login-error" class="auth-error hidden"></div>
      </form>
    </div>
  </div>

  <!-- Модальное окно для регистрации -->
<div id="register-modal" class="modal hidden">
  <div class="modal-content">
    <span class="close-modal" data-modal="register">&times;</span>
    <h2>Регистрация</h2>
    <form id="register-form">
      <input type="email" id="register-email" placeholder="Email" required>
      <input type="password" id="register-password" placeholder="Пароль" required>
      <input type="password" id="register-password-confirm" placeholder="Повторите пароль" required>
      <button type="submit">Зарегистрироваться</button>
      <div id="register-error" class="auth-error hidden"></div>
    </form>
  </div>
</div>

  <script src="lib/elmish.js"></script>
  <script src="lib/todo-app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Запуск приложения
    var model = { todos: [], hash: '#/' };
    mount(model, update, view, 'app', subscriptions);
  </script>
</body>
</html>
